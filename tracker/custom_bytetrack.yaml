# Tuned ByteTrack configuration for cleaner IDs on common real-world video.
# Raise track_high_thresh/new_track_thresh for fewer false tracks; lower them for dim scenes.
tracker_type: bytetrack
track_high_thresh: 0.35
track_low_thresh: 0.08
new_track_thresh: 0.35
track_buffer: 45
match_thresh: 0.82
fuse_score: True

